{{- if .Values.tests.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Values.app.name }}-test-connection"
  namespace: {{ .Values.namespace | default "prod" }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - |
          echo "Testing application endpoint..."
          wget -q -O- http://{{ .Values.app.name }}:{{ .Values.service.port }}/ || exit 1
          echo "Testing actuator health..."
          wget -q -O- http://{{ .Values.app.name }}:{{ .Values.service.port }}/actuator/health || exit 1
          echo "All tests passed!"
{{- end }}
