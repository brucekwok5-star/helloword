# Canary deployment configuration

namespace: prod
environment: prod

# Main/stable deployment
stable:
  enabled: true
  name: helloworld-stable
  replicas: 1
  image:
    tag: "1.0.0"

# Canary deployment
canary:
  enabled: true
  name: helloworld-canary
  replicas: 1
  image:
    tag: "1.0.0"  # Change this tag to test canary

# Traffic weight (percentage)
traffic:
  canaryPercentage: 10  # 10% to canary, 90% to stable

resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "200m"

service:
  type: NodePort
  port: 80

livenessProbe:
  enabled: true
  path: /actuator/health
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  enabled: true
  path: /actuator/health
  initialDelaySeconds: 10
  periodSeconds: 5
