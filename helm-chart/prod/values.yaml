# Production environment

environment: prod

replicas: 3

image:
  tag: 1.0.0

resources:
  requests:
    memory: "1Gi"
    cpu: "500m"
  limits:
    memory: "2Gi"
    cpu: "2000m"

service:
  type: LoadBalancer

livenessProbe:
  initialDelaySeconds: 60
  periodSeconds: 15

readinessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
