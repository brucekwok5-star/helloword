# Production environment

namespace: prod
environment: prod

replicas: 1

image:
  repository: ghcr.io/brucekwok5-star/helloword
  tag: latest

resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "250m"

service:
  type: LoadBalancer

livenessProbe:
  initialDelaySeconds: 60
  periodSeconds: 15

readinessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
