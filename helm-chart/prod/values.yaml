# Production environment

namespace: prod
environment: prod

replicas: 2

image:
  repository: ghcr.io/brucekwok5-star/helloworld
  tag: 98008b2

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/actuator/prometheus"

# Production resources - more generous for stability
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

service:
  type: LoadBalancer

# Slower probes for production to avoid premature restarts
livenessProbe:
  initialDelaySeconds: 60
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3

# Pod disruption budget for high availability
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Network policy for production
networkPolicy:
  enabled: false

# MySQL configuration
mysql:
  enabled: true
  password: root123
