apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helloworld-prod
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/brucekwok5-star/helloword.git
    targetRevision: main
    path: helm-chart
    helm:
      valueFiles:
        - values.yaml
        - prod/values.yaml
      parameters:
        - name: image.repository
          value: 471ad41
        - name: image.tag
          value: 471ad41
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
